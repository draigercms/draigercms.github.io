<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Build with Zola-Hook">
    <title>Draiger-CMS-Site</title>
    
    <link rel="stylesheet" href="https://draigercms.github.io/style.css?h=c59bf21e289e8d31d2b7">
    
    
        
    
</head>
<body>
    
    <header class="space">
        <h1>Draiger-CMS-Site</h1>
        
        
        <nav class="header-links">
            
            <a href="mailto:dr_chanmp@disroot.org">Mail</a>
            
            <a href="https:&#x2F;&#x2F;github.com&#x2F;draigercms">GitHub</a>
            
            <a href="https:&#x2F;&#x2F;mstdn.plus&#x2F;@draigercms">Mastodon</a>
            
            
        </nav>
        
    </header>
    
    
    
    
    <main>
        
        
        <h2>Recent posts</h2>
        <ul>
            
            <li><a href="https:&#x2F;&#x2F;draigercms.github.io&#x2F;blog&#x2F;about&#x2F;">About</a></li>
            
        </ul>
        <p><a href="https:&#x2F;&#x2F;draigercms.github.io&#x2F;blog&#x2F;">Archive</a></p>
        
    </main>
    
    
    <div class="dark-mode-buttons">
        <button class="dark-mode-button" id="dark-mode-on"><img src="https://draigercms.github.io/dark_mode.svg" width="24" height="24" alt="Dark mode" aria-label="dark mode toggle" title="Dark mode"></button>
        <button class="dark-mode-button" id="dark-mode-off"><img src="https://draigercms.github.io/light_mode.svg" width="24" height="24" alt="Light mode" aria-label="light mode toggle" title="Light mode"></button>
    </div>
    <script>
        const cls = document.querySelector("html").classList;
        const sessionTheme = sessionStorage.getItem("theme");

        function setDark() {
            cls.add("dark-mode");
            cls.remove("light-mode");
            sessionStorage.setItem("theme", "dark");
        }
        function setLight() {
            cls.add("light-mode");
            cls.remove("dark-mode");
            sessionStorage.setItem("theme", "light");
        }

        if (sessionTheme === "dark") {
            setDark();
        } else if (sessionTheme === "light") {
            setLight();
        } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            setDark();
        }

        document.getElementById("dark-mode-on").addEventListener("click", function(e) {
            setDark();
        });
        document.getElementById("dark-mode-off").addEventListener("click", function(e) {
            setLight();
        });
    </script>
    <noscript>
        <style>
            .dark-mode-buttons {
                display: none;
            }
        </style>
    </noscript>
</body>
</html>
